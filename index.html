- If the issue is outside Indian jurisdiction or not a legal issue, say so in the summary and still give the best general guidance.

{
  "summary": "1-2 sentence summary of the user's situation and the most important right/remedy.",
  "category": "consumer|employment|police|tenant|banking|medical|cyber|women|rti|education|disability|other",
  "rights": {
    "fundamentalRights": [{"article": "Article 21", "title": "Right to life and dignity"}],
    "laws": ["Consumer Protection Act, 2019 — Section 2(47)", "..."],
    "explanation": "Plain-language explanation of what the law says in the user's favor."
  },
  "steps": [
    {"title": "Step 1: ...", "detail": "What to do, clearly.", "template": "Sample text if applicable, else empty string", "timeline": "e.g., 7–15 days"}
  ],
  "portals": [
    {"name": "National Consumer Helpline", "url": "https://consumerhelpline.gov.in", "purpose": "Why this portal is relevant"}
  ],
  "help": {
    "freeLegalAid": "NALSA/DLSA eligibility and how to apply for this user.",
    "consumerForums": "Only if relevant: jurisdiction, fees, how to file. Else empty string.",
    "ngos": ["Relevant NGO/helpline 1", "..."],
    "lawyerAdvice": "When the user needs a lawyer vs when they can DIY."
  },
  "know": {
    "timeLimits": "Statutory limits for filing complaints relevant to this issue.",
    "documents": ["Doc 1", "Doc 2"],
    "mistakes": ["Common mistake 1", "..."],
    "firRights": "Relevant FIR/police rights (BNSS §173 etc.) if the issue involves police or criminal matters, else empty string."
  }
}

Valid URLs to use when relevant: https://consumerhelpline.gov.in, https://pgportal.gov.in, https://cybercrime.gov.in, https://nhrc.nic.in, https://cms.rbi.org.in, https://ecourts.gov.in, https://nalsa.gov.in, https://edaakhil.nic.in, https://shebox.wcd.gov.in, https://ncw.nic.in, https://labour.gov.in, https://epfigms.gov.in, https://igrs.trai.gov.in, https://irdai.gov.in, https://scores.sebi.gov.in, https://rtionline.gov.in.`;

      function useLocalStorage(key, initial) {
        const [v, setV] = useState(() => {
          try { const raw = localStorage.getItem(key); return raw ? JSON.parse(raw) : initial; }
          catch { return initial; }
        });
        useEffect(() => { try { localStorage.setItem(key, JSON.stringify(v)); } catch {} }, [key, v]);
        return [v, setV];
      }

      function extractJSON(text) {
        if (!text) return null;
        let t = text.trim();
        t = t.replace(/^```(?:json)?\s*/i, "").replace(/```\s*$/, "");
        try { return JSON.parse(t); } catch {}
        const first = t.indexOf("{");
        const last = t.lastIndexOf("}");
        if (first >= 0 && last > first) {
          try { return JSON.parse(t.slice(first, last + 1)); } catch {}
        }
        return null;
      }

      async function callClaude(issue, lang) {
        const res = await fetch("https://api.anthropic.com/v1/messages", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "anthropic-dangerous-direct-browser-access": "true",
          },
          body: JSON.stringify({
            model: "claude-sonnet-4-20250514",
            max_tokens: 3000,
            system: systemPrompt(lang),
            messages: [{ role: "user", content: issue }],
          }),
        });
        if (!res.ok) throw new Error("API " + res.status);
        const data = await res.json();
        const text = data?.content?.[0]?.text || "";
        const parsed = extractJSON(text);
        if (!parsed) throw new Error("Invalid JSON");
        return parsed;
      }

      // ——— icons ———
      const Icon = ({ name, className = "w-5 h-5" }) => {
        const paths = {
          scales: <path d="M12 3v18M5 7h14M7 7l-3 7a4 4 0 0 0 6 0L7 7zm10 0l-3 7a4 4 0 0 0 6 0l-3-7z" />,
          steps: <path d="M3 20h4v-4h4v-4h4V8h4V4" />,
          pin: <><path d="M12 22s7-7.5 7-13a7 7 0 1 0-14 0c0 5.5 7 13 7 13z" /><circle cx="12" cy="9" r="2.5" /></>,
          hand: <path d="M9 11V5a2 2 0 1 1 4 0v6M13 11V4a2 2 0 1 1 4 0v9M17 10V6a2 2 0 1 1 4 0v10a6 6 0 0 1-6 6h-2a6 6 0 0 1-6-6v-3l-2-2a2 2 0 0 1 3-3l2 2" />,
          bulb: <><path d="M9 18h6M10 22h4M12 2a7 7 0 0 0-4 12.7c1 .7 1.5 1.7 1.5 2.8V18h5v-.5c0-1.1.5-2.1 1.5-2.8A7 7 0 0 0 12 2z" /></>,
          chev: <polyline points="6 9 12 15 18 9" />,
          search: <><circle cx="11" cy="11" r="7" /><path d="m20 20-3.5-3.5" /></>,
          external: <><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6" /><path d="M15 3h6v6M10 14 21 3" /></>,
          copy: <><rect x="9" y="9" width="13" height="13" rx="2" /><path d="M5 15V5a2 2 0 0 1 2-2h10" /></>,
          sparkle: <path d="M12 2v6m0 8v6M2 12h6m8 0h6M5 5l4 4m6 6 4 4M19 5l-4 4m-6 6-4 4" />,
          warn: <><path d="M12 9v4m0 4h.01" /><path d="M10.3 3.9 2.7 17a2 2 0 0 0 1.7 3h15.2a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z" /></>,
        };
        return (
          <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
            {paths[name]}
          </svg>
        );
      };

      const Chip = ({ children, active, onClick }) => (
        <button
          onClick={onClick}

              : "bg-white text-deep border-sky2 hover:border-brand2 hover:bg-sky1"
          }`}
        >
          {children}
        </button>
      );

      function CopyBtn({ text, L }) {
        const [copied, setCopied] = useState(false);
        return (
          <button
            onClick={() => {
              navigator.clipboard?.writeText(text);
              setCopied(true);
              setTimeout(() => setCopied(false), 1500);
            }}

          >
            <Icon name="copy" className="w-3.5 h-3.5" />

          </button>
        );
      }

      function Section({ icon, title, children, defaultOpen = false, accent = "brand" }) {

          saffron: "bg-saffron/15 text-saffron",
          green: "bg-green2/15 text-green2",

        return (

            </div>
          </details>

      }

      function RightsSection({ data, L }) {
        const fr = data?.rights?.fundamentalRights || [];
        const laws = data?.rights?.laws || [];
        return (
          <Section icon="scales" title={L.sections.rights} accent="brand" defaultOpen>

                <div className="grid sm:grid-cols-2 gap-2">
                  {fr.map((r, i) => (
                    <div key={i} className="border border-sky2 rounded-lg px-3 py-2 bg-sky1/50">
                      <div className="font-semibold text-brand text-sm">{r.article}</div>
                      <div className="text-sm text-deep/80">{r.title}</div>
                    </div>
                  ))}
                </div>
              </div>
            )}
            {laws.length > 0 && (
              <div>
                <div className="text-xs font-semibold uppercase tracking-wider text-brand2 mb-2">{L.labels.laws}</div>
                <ul className="space-y-1.5">
                  {laws.map((x, i) => (
                    <li key={i} className="flex gap-2"><span className="text-brand mt-1">§</span><span>{x}</span></li>
                  ))}
                </ul>
              </div>
            )}
            {data?.rights?.explanation && (
              <div>
                <div className="text-xs font-semibold uppercase tracking-wider text-brand2 mb-2">{L.labels.explanation}</div>
                <p className="text-deep/90">{data.rights.explanation}</p>
              </div>
            )}
          </Section>
        );
      }

      function StepsSection({ data, L }) {
        const steps = data?.steps || [];
        if (!steps.length) return null;
        return (
          <Section icon="steps" title={L.sections.steps} accent="saffron" defaultOpen>
            <ol className="space-y-4">
              {steps.map((s, i) => (
                <li key={i} className="relative pl-10">

                  <div className="font-semibold text-deep">{s.title}</div>
                  {s.detail && <div className="text-deep/80 mt-1">{s.detail}</div>}
                  {s.timeline && (
                    <div className="mt-1 text-xs inline-flex items-center gap-1 text-saffron font-medium">
                      <span className="w-1.5 h-1.5 rounded-full bg-saffron" /> {L.labels.timeline}: {s.timeline}
                    </div>

                  {s.template && s.template.trim() && (
                    <div className="mt-2 border border-sky2 rounded-lg bg-sky1/40 p-3">
                      <div className="flex items-center justify-between mb-1.5">
                        <span className="text-xs font-semibold uppercase tracking-wider text-brand2">{L.labels.template}</span>
                        <CopyBtn text={s.template} L={L} />
                      </div>
                      <pre className="whitespace-pre-wrap text-sm text-deep/85 font-sans">{s.template}</pre>
                    </div>
                  )}
                </li>
              ))}
            </ol>
          </Section>
        );
      }

      function PortalsSection({ data, L }) {
        const portals = data?.portals || [];
        if (!portals.length) return null;
        return (
          <Section icon="pin" title={L.sections.portals} accent="green">
            <div className="grid sm:grid-cols-2 gap-3">
              {portals.map((p, i) => (
                <a
                  key={i}

                  className="group border border-sky2 rounded-xl p-3.5 bg-white hover:border-green2 hover:bg-green2/5 transition block"

                  <div className="flex items-start justify-between gap-2">
                    <div className="font-semibold text-deep text-sm">{p.name}</div>
                    <Icon name="external" className="w-4 h-4 text-green2 flex-shrink-0" />
                  </div>
                  {p.purpose && <div className="text-xs text-deep/70 mt-1">{p.purpose}</div>}
                  <div className="text-xs text-brand mt-1.5 truncate">{p.url}</div>
                </a>
              ))}
            </div>
          </Section>
        );
      }

      function HelpSection({ data, L }) {
        const h = data?.help || {};
        return (
          <Section icon="hand" title={L.sections.help} accent="deep">
            {h.freeLegalAid && (
              <div>
                <div className="text-xs font-semibold uppercase tracking-wider text-brand2 mb-1">{L.labels.freeLegal}</div>
                <p>{h.freeLegalAid}</p>
              </div>
            )}
            {h.consumerForums && h.consumerForums.trim() && (
              <div>
                <div className="text-xs font-semibold uppercase tracking-wider text-brand2 mb-1">{L.labels.forums}</div>
                <p>{h.consumerForums}</p>
              </div>
            )}
            {Array.isArray(h.ngos) && h.ngos.length > 0 && (
              <div>
                <div className="text-xs font-semibold uppercase tracking-wider text-brand2 mb-1">{L.labels.ngos}</div>
                <ul className="flex flex-wrap gap-2">
                  {h.ngos.map((n, i) => (
                    <li key={i} className="px-3 py-1.5 rounded-full border border-sky2 bg-sky1/60 text-sm">{n}</li>
                  ))}
                </ul>
              </div>
            )}
            {h.lawyerAdvice && (
              <div>
                <div className="text-xs font-semibold uppercase tracking-wider text-brand2 mb-1">{L.labels.lawyer}</div>
                <p>{h.lawyerAdvice}</p>
              </div>
            )}
          </Section>
        );
      }

      function KnowSection({ data, L }) {
        const k = data?.know || {};
        return (
          <Section icon="bulb" title={L.sections.know} accent="warn">
            {k.timeLimits && (
              <div>
                <div className="text-xs font-semibold uppercase tracking-wider text-brand2 mb-1">{L.labels.timeLimits}</div>
                <p>{k.timeLimits}</p>
              </div>
            )}
            {Array.isArray(k.documents) && k.documents.length > 0 && (
              <div>
                <div className="text-xs font-semibold uppercase tracking-wider text-brand2 mb-1">{L.labels.documents}</div>
                <ul className="grid sm:grid-cols-2 gap-1.5">
                  {k.documents.map((d, i) => (
                    <li key={i} className="flex gap-2"><span className="text-green2">✓</span><span>{d}</span></li>
                  ))}
                </ul>
              </div>
            )}
            {Array.isArray(k.mistakes) && k.mistakes.length > 0 && (
              <div>
                <div className="text-xs font-semibold uppercase tracking-wider text-brand2 mb-1">{L.labels.mistakes}</div>
                <ul className="space-y-1.5">
                  {k.mistakes.map((d, i) => (
                    <li key={i} className="flex gap-2"><span className="text-red-500">✗</span><span>{d}</span></li>
                  ))}
                </ul>
              </div>
            )}
            {k.firRights && k.firRights.trim() && (
              <div className="border-l-4 border-saffron bg-saffron/10 rounded-r-lg p-3">
                <div className="text-xs font-semibold uppercase tracking-wider text-saffron mb-1">{L.labels.fir}</div>
                <p className="text-deep/90">{k.firRights}</p>

            )}
          </Section>
        );

      function Results({ data, L, isFallback, onRetry }) {
        return (
          <div className="space-y-4">
            {isFallback && (
              <div className="bg-red-50 border border-red-200 rounded-xl p-4 flex items-start gap-3">
                <Icon name="warn" className="w-5 h-5 text-red-500 flex-shrink-0 mt-0.5" />
                <div className="flex-1">
                  <div className="font-semibold text-red-700">{L.errorTitle}</div>
                  <div className="text-sm text-red-600/90">{L.errorSub}</div>
                </div>
                {onRetry && (
                  <button onClick={onRetry} className="text-sm font-medium text-red-700 border border-red-300 rounded-lg px-3 py-1.5 hover:bg-red-100">
                    {L.tryAgain}
                  </button>
                )}
              </div>
            )}
            {data.summary && (
              <div className="bg-gradient-to-br from-brand to-deep text-white rounded-2xl p-5 card-shadow">
                <div className="flex items-start gap-2">
                  <Icon name="sparkle" className="w-5 h-5 mt-0.5 flex-shrink-0 opacity-90" />
                  <p className="text-[15px] leading-relaxed">{data.summary}</p>
                </div>
              </div>
            )}
            <RightsSection data={data} L={L} />
            <StepsSection data={data} L={L} />
            <PortalsSection data={data} L={L} />
            <HelpSection data={data} L={L} />
            <KnowSection data={data} L={L} />
          </div>
        );
      }

      function App() {
        const [lang, setLang] = useLocalStorage("kyri_lang", "en");
        const [issue, setIssue] = useState("");
        const [loading, setLoading] = useState(false);
        const [result, setResult] = useState(null);
        const [isFallback, setIsFallback] = useState(false);
        const [error, setError] = useState("");
        const L = STRINGS[lang];
        const resultsRef = useRef(null);
        const lastIssueRef = useRef("");

        async function analyze(text) {
          const query = (text ?? issue).trim();
          if (!query) return;
          lastIssueRef.current = query;
          setLoading(true);
          setError("");
          setResult(null);
          setIsFallback(false);
          try {
            const data = await callClaude(query, lang);
            setResult(data);
          } catch (e) {
            setResult(FALLBACK[lang]);
            setIsFallback(true);
            setError(String(e?.message || e));
          } finally {
            setLoading(false);
            setTimeout(() => {
              resultsRef.current?.scrollIntoView({ behavior: "smooth", block: "start" });
            }, 100);
          }
        }

        function onQuickPick(q) {
          setIssue(q.prompt);
          analyze(q.prompt);
        }

        return (
          <div className="min-h-screen">
            <div className="h-1 tricolor-bar" />
            <header className="bg-white border-b border-sky2/70 sticky top-0 z-20 backdrop-blur">
              <div className="max-w-3xl mx-auto px-4 py-3 flex items-center justify-between">
                <div className="flex items-center gap-3">
                  <div className="w-9 h-9 rounded-lg bg-gradient-to-br from-brand to-deep flex items-center justify-center text-white">
                    <Icon name="scales" className="w-5 h-5" />
                  </div>
                  <div className="leading-tight">
                    <div className="font-bold text-deep text-[15px]">{L.appTitle}</div>
                    <div className="text-[11px] text-deep/60">{L.appSub}</div>
                  </div>
                </div>
                <div className="flex items-center gap-1 bg-sky1 rounded-full p-1 border border-sky2">
                  <button
                    onClick={() => setLang("en")}
                    className={`px-3 py-1 rounded-full text-xs font-semibold transition ${lang === "en" ? "bg-white text-deep shadow" : "text-deep/60"}`}
                  >EN</button>
                  <button
                    onClick={() => setLang("hi")}
                    className={`px-3 py-1 rounded-full text-xs font-semibold transition ${lang === "hi" ? "bg-white text-deep shadow" : "text-deep/60"}`}
                  >हिं</button>
                </div>
              </div>
            </header>

            <main className="max-w-3xl mx-auto px-4 pt-6 pb-24">
              <section className="mb-6">
                <h1 className="text-2xl sm:text-3xl font-bold text-deep leading-tight">{L.heroTitle}</h1>
                <p className="text-deep/70 mt-2 text-[15px]">{L.heroSub}</p>
              </section>

              <section className="mb-5">
                <div className="text-xs font-semibold uppercase tracking-wider text-brand2 mb-2.5">{L.quickPicks}</div>
                <div className="flex gap-2 overflow-x-auto pb-2 -mx-4 px-4 sm:flex-wrap sm:overflow-visible sm:mx-0 sm:px-0 scrollbar-thin">
                  {L.quickIssues.map((q) => (
                    <Chip key={q.id} onClick={() => onQuickPick(q)}>{q.label}</Chip>
                  ))}
                </div>
              </section>

              <section className="mb-8">
                <div className="bg-white rounded-2xl border border-sky2 card-shadow p-3 sm:p-4">
                  <textarea
                    value={issue}
                    onChange={(e) => setIssue(e.target.value)}
                    placeholder={L.placeholder}
                    rows={4}
                    className="w-full resize-none outline-none text-[15px] text-deep placeholder-deep/40 bg-transparent px-2 py-2"
                  />
                  <div className="flex items-center justify-between mt-2 pt-2 border-t border-sky2/70">
                    <div className="text-xs text-deep/50 flex items-center gap-1.5">
                      <Icon name="search" className="w-3.5 h-3.5" />
                      <span>{issue.length > 0 ? `${issue.length} chars` : "—"}</span>
                    </div>
                    <button
                      onClick={() => analyze()}
                      disabled={loading || !issue.trim()}
                      className="inline-flex items-center gap-2 bg-gradient-to-r from-brand to-deep text-white font-semibold text-sm px-5 py-2.5 rounded-xl disabled:opacity-50 disabled:cursor-not-allowed hover:shadow-lg transition"
                    >
                      {loading ? (
                        <>
                          <svg className="spin w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                            <circle cx="12" cy="12" r="9" strokeOpacity="0.3" />
                            <path d="M21 12a9 9 0 0 0-9-9" />
                          </svg>
                          <span>{L.analyzing}</span>
                        </>
                      ) : (
                        <>
                          <Icon name="sparkle" className="w-4 h-4" />
                          <span>{L.analyze}</span>
                        </>
                      )}
                    </button>
                  </div>
                </div>
              </section>

              <div ref={resultsRef}>
                {loading && !result && (
                  <div className="bg-white rounded-2xl border border-sky2 card-shadow p-8 text-center">
                    <div className="inline-flex items-center gap-1.5 mb-3">
                      <span className="w-2 h-2 rounded-full bg-brand pulse-dot" />
                      <span className="w-2 h-2 rounded-full bg-brand pulse-dot" />
                      <span className="w-2 h-2 rounded-full bg-brand pulse-dot" />
                    </div>
                    <div className="font-semibold text-deep">{L.analyzing}…</div>
                    <div className="text-sm text-deep/60 mt-1">
                      {lang === "hi" ? "संविधान, कानून और पोर्टल जाँचे जा रहे हैं" : "Scanning Constitution, Acts, and government portals"}
                    </div>
                  </div>
                )}

                {result && (
                  <Results data={result} L={L} isFallback={isFallback} onRetry={() => analyze(lastIssueRef.current)} />
                )}
              </div>

              <footer className="mt-10 text-center text-xs text-deep/60 leading-relaxed border-t border-sky2 pt-6">
                <div className="mx-auto h-0.5 w-16 tricolor-bar rounded-full mb-4" />
                <p className="max-w-xl mx-auto">{L.disclaimer}</p>
                <p className="mt-3 text-deep/40">NALSA · {new Date().getFullYear()}</p>
              </footer>
            </main>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
